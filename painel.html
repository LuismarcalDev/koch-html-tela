        <div class="links">

                <div class="abas-gerais">

                </div>

              </button>
            </div>

            <div class="painel-infos">

                    </h2>

                         <div class="input-pessoal">

                            <input type="text" placeholder="(11) 9999-999 ">

                         <div class="input-pessoal">
                            <label for="email">Seu Email</label>
                            <input type="text" placeholder="tomazjuliano@gmail.com">
                         </div>
                         
                         <div class="controller">
                <button class="btn-save">

            </button>
        </div>

            </div>
            
            <div class="assinaturas">
                    <p>Confira suas Cestas Assinadas</p>
                    <div>
                        <div>
                            
                        </div>
                    </div>
            </div>
