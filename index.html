<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Document</title>
</head>
<body>
    <header class="topbar">
        <img src="logo.png" alt="Logo Koch">
        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="menu-button" aria-label="Abrir menu">
            <i class="fa-solid fa-bars"></i>
        </label>
        <div class="links">
            <a href="#">Inicio</a>
            <a href="#">Suinos</a>
            <a href="#">Carnes</a>
            <a href="#">Historia</a>
            <a href="#">Sobre</a>
            <a href="#">Delivery</a>
            <a href="#" class="mobile-action"><i class="fa-solid fa-user"></i>Usuario</a>
            <a href="#" class="mobile-action"><i class="fa-solid fa-cart-shopping"></i>Carrinho</a>
            <a href="#" class="mobile-action"><i class="fa-solid fa-phone"></i>Contato</a>
        </div>
        <div class="icons">
            <i class="fa-solid fa-user"></i>
            <i class="fa-solid fa-cart-shopping"></i>
            <button>
           <i class="fa-solid fa-phone"></i>
            Contato
        </button>
        </div>
        <label for="menu-toggle" class="menu-overlay" aria-hidden="true"></label>
        
    </header>
    <main>
        <div class="login">
            <img src="logo.png" alt="">
            <div class="subLogin">
                <h2>Faça Login</h2>
                <div class="inputs">
                    <div class="solo">
                        <label for="">Email</label>
                        <input type="text" placeholder="Informe seu E-mail">
                    </div>
                    <div class="solo">
                        <label for="">Senha</label>
                        <input type="text" placeholder="Informe sua Senha">
                    </div>
                    <div class="double">
                        <button>Fazer Login</button>
                        <p>Cadastre-se</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="site-footer">
        <div class="site-footer__inner">
            <div class="site-footer__brand" aria-label="KOCH Embutidos e suínos">
                <div class="site-footer__deco site-footer__deco--left">
                    <span class="site-footer__line" aria-hidden="true"></span>
                    <span class="site-footer__bar" aria-hidden="true">|</span>
                </div>
                <div class="site-footer__titles">
                    <p class="site-footer__name">KOCH</p>
                    <p class="site-footer__tagline">Embutidos e suínos</p>
                </div>
                <div class="site-footer__deco site-footer__deco--right">
                    <span class="site-footer__bar" aria-hidden="true">|</span>
                    <span class="site-footer__line" aria-hidden="true"></span>
                </div>
            </div>
            <p class="site-footer__copy">© 2025 Grupo 2. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>
</html>
